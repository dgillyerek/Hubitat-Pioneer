<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0c10" />
  <title>Pioneer AVR Remote</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #141820;
      --panel2: #1c2230;
      --line: #2a3348;
      --text: #eef2f8;
      --muted: #8b97ad;
      --accent: #3a96ff;
      --accent-dim: #1e4a80;
      --on: #2ecc71;
      --off: #555d6e;
      --danger: #e74c3c;
      --btn-h: 54px;
      --radius: 16px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(ellipse at top, #151b28 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100%;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 14px max(20px, env(safe-area-inset-bottom));
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    header p { margin: 2px 0 0; font-size: 0.78rem; color: var(--muted); }
    .icon-btn {
      width: 42px; height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
    }
    .zones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 520px) {
      .zones { grid-template-columns: 1fr; }
    }
    .zone {
      background: linear-gradient(180deg, var(--panel2) 0%, var(--panel) 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }
    .zone-hd { opacity: 0.95; }
    .zone-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-height: 28px;
    }
    .pill {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      background: #243049;
      color: var(--muted);
    }
    .pill.on { background: rgba(46,204,113,0.18); color: var(--on); }
    .pill.off { background: rgba(85,93,110,0.25); color: #aab2c0; }
    .input-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .remote {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .remote.single-col { grid-template-columns: 1fr 1fr; }
    .btn {
      border: none;
      border-radius: var(--radius);
      min-height: var(--btn-h);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      background: linear-gradient(180deg, #2a3348 0%, #1e2535 100%);
      border: 1px solid #3a455e;
      box-shadow: 0 4px 0 #121722, 0 6px 16px rgba(0,0,0,0.35);
      transition: transform 0.05s, box-shadow 0.05s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      user-select: none;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #121722, 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.power {
      grid-column: span 2;
      min-height: 58px;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }
    .btn.power.on {
      background: linear-gradient(180deg, #2ecc71 0%, #1e9a52 100%);
      border-color: #3ddc84;
      color: #0a2015;
      box-shadow: 0 4px 0 #145a32, 0 6px 16px rgba(46,204,113,0.25);
    }
    .btn.power.off-state {
      background: linear-gradient(180deg, #4a5568 0%, #2d3548 100%);
    }
    .btn.accent {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      border-color: #5aafff;
      color: #fff;
      box-shadow: 0 4px 0 #163a66, 0 6px 16px rgba(58,150,255,0.25);
    }
    .btn.wide { grid-column: span 2; }
    .btn svg { width: 22px; height: 22px; fill: currentColor; }
    .vol-block {
      grid-column: span 2;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
    }
    .vol-label {
      grid-column: span 3;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: -4px;
    }
    .vol-readout {
      min-width: 84px;
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
      color: var(--text);
      padding: 10px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }
    .vol-readout.muted {
      opacity: 0.45;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .footer.err { color: var(--danger); }
    dialog {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      color: var(--text);
      padding: 0;
      max-width: 420px;
      width: calc(100% - 24px);
    }
    dialog::backdrop { background: rgba(0,0,0,0.65); }
    .dialog-body { padding: 18px; }
    .dialog-body h2 { margin: 0 0 12px; font-size: 1rem; }
    .dialog-body label { display: block; font-size: 0.78rem; color: var(--muted); margin: 10px 0 4px; }
    .dialog-body input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0d1017;
      color: var(--text);
    }
    .dialog-actions { display: flex; gap: 10px; margin-top: 16px; }
    .dialog-actions button { flex: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Pioneer AVR</h1>
        <p id="hubLabel">Loading…</p>
      </div>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </header>

    <div class="zones">
      <section class="zone" id="mainZone">
        <div class="zone-title">Main</div>
        <div class="status-row">
          <span class="pill off" id="mainPowerPill">OFF</span>
        </div>
        <p class="input-name" id="mainInput">—</p>
        <p class="meta" id="mainMeta">Volume — · Mute —</p>
        <div class="remote">
          <button class="btn power off-state" id="mainPower" type="button">Power</button>
          <button class="btn" id="mainInPrev" type="button" title="Input previous">
            <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6V6z"/></svg>
            Input
          </button>
          <button class="btn accent" id="mainInNext" type="button" title="Input next">
            Input
            <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6V6z"/></svg>
          </button>
          <div class="vol-block">
            <span class="vol-label">Volume</span>
            <button class="btn" id="mainVolDown" type="button" aria-label="Volume down">
              <svg viewBox="0 0 24 24"><path d="M5 12h14v2H5z"/></svg>
            </button>
            <div class="vol-readout" id="mainVolume" aria-live="polite">—</div>
            <button class="btn accent" id="mainVolUp" type="button" aria-label="Volume up">
              <svg viewBox="0 0 24 24"><path d="M11 5h2v14h-2zm7 0h2v14h-2z"/></svg>
            </button>
          </div>
          <button class="btn wide" id="mainMute" type="button">Mute</button>
        </div>
      </section>

      <section class="zone zone-hd" id="hdZone">
        <div class="zone-title">HD Zone</div>
        <div class="status-row">
          <span class="pill off" id="hdPowerPill">OFF</span>
        </div>
        <p class="input-name" id="hdInput">—</p>
        <p class="meta" id="hdMeta">Input only</p>
        <div class="remote single-col">
          <button class="btn power off-state" id="hdPower" type="button">Power</button>
          <button class="btn" id="hdInPrev" type="button">
            <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6V6z"/></svg>
            Input
          </button>
          <button class="btn accent" id="hdInNext" type="button">
            Input
            <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6V6z"/></svg>
          </button>
        </div>
      </section>
    </div>

    <p class="footer" id="msg">Ready</p>
  </div>

  <dialog id="settingsDialog">
    <div class="dialog-body">
      <h2>Connection</h2>
      <p style="margin:0 0 10px;font-size:0.85rem;color:var(--muted)">
        Usually loaded from <code>pioneer-avr-token.json</code> on your hub. Override here if needed.
      </p>
      <label>Hub IP</label>
      <input id="cfgHubIp" placeholder="192.168.1.50" />
      <label>Maker API App ID</label>
      <input id="cfgAppId" placeholder="1" />
      <label>Maker API Access Token</label>
      <input id="cfgToken" type="password" placeholder="paste token" />
      <label>Main zone device ID</label>
      <input id="cfgMainId" placeholder="e.g. 56" />
      <label>HD Zone device ID (optional)</label>
      <input id="cfgHdId" placeholder="e.g. 59" />
      <div class="dialog-actions">
        <button class="btn" type="button" id="cfgCancel">Cancel</button>
        <button class="btn accent" type="button" id="cfgSave">Save</button>
      </div>
    </div>
  </dialog>

  <script>
    const PIONEER_DASHBOARD_VERSION = "1.0.7";
    const STORAGE_KEY = "pioneer.avr.remote.cfg";
    const DEBUG = new URLSearchParams(location.search).has("debug");
    const NORMAL_REFRESH_MS = 8000;
    const FAST_REFRESH_MS = 500;
    const FAST_REFRESH_DURATION_MS = 15000;
    const BURST_POLL_MS = 250;
    const BURST_POLL_DURATION_MS = 3000;

    let cfg = {
      hubIp: "",
      makerAppId: "1",
      makerAccessToken: "",
      mainDeviceId: "",
      hdZoneDeviceId: "",
    };

    const els = {
      hubLabel: document.getElementById("hubLabel"),
      msg: document.getElementById("msg"),
      mainPowerPill: document.getElementById("mainPowerPill"),
      hdPowerPill: document.getElementById("hdPowerPill"),
      mainInput: document.getElementById("mainInput"),
      hdInput: document.getElementById("hdInput"),
      mainMeta: document.getElementById("mainMeta"),
      hdMeta: document.getElementById("hdMeta"),
      mainVolume: document.getElementById("mainVolume"),
      mainPower: document.getElementById("mainPower"),
      hdPower: document.getElementById("hdPower"),
      hdZone: document.getElementById("hdZone"),
    };

    let refreshTimer = null;
    let refreshInFlight = false;
    let refreshPending = false;
    let burstPollTimer = null;
    let fastRefreshUntil = 0;
    let volumeRefreshRequested = false;
    let volumeFreshUntil = 0;
    let lastLocalVolume = null;

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function loadStoredCfg() {
      try {
        const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        cfg = { ...cfg, ...s };
      } catch (e) {}
    }

    function saveStoredCfg() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    }

    async function fetchLiveState() {
      try {
        const res = await fetch("./pioneer-avr-token.json?ts=" + Date.now());
        if (!res.ok) {
          return null;
        }
        const t = await res.json();
        return { main: t.mainState, hd: t.hdState };
      } catch (e) {
        return null;
      }
    }

    function volumeFromState(state) {
      if (!state) {
        return null;
      }
      return formatVolume(state.volumeDb, false) || formatVolume(state.volume, true);
    }

    function inputFromState(state) {
      if (!state) {
        return "—";
      }
      return state.mediaInputSource || state.input || "—";
    }

    function applyMainZoneState(state) {
      if (!state) {
        return false;
      }
      const on = state.switch === "on";
      setPowerUi(els.mainPowerPill, els.mainPower, on);
      els.mainInput.textContent = inputFromState(state);
      let vol = volumeFromState(state);
      if (Date.now() < volumeFreshUntil && lastLocalVolume) {
        vol = lastLocalVolume;
      } else if (vol) {
        lastLocalVolume = vol;
      }
      setMainStatusUi(vol, state.mute === "muted");
      return true;
    }

    function applyHdZoneState(state) {
      if (!state) {
        return false;
      }
      const on = state.switch === "on";
      setPowerUi(els.hdPowerPill, els.hdPower, on);
      els.hdInput.textContent = inputFromState(state);
      return true;
    }

    function apiBase() {
      return `http://${cfg.hubIp}/apps/api/${cfg.makerAppId}`;
    }

    function apiUrl(deviceId, command) {
      const q = `access_token=${encodeURIComponent(cfg.makerAccessToken)}`;
      return `${apiBase()}/devices/${deviceId}/${command}?${q}`;
    }

    function deviceUrl(deviceId) {
      return `${apiBase()}/devices/${deviceId}?access_token=${encodeURIComponent(cfg.makerAccessToken)}`;
    }

    function setMsg(text, isError) {
      els.msg.textContent = text;
      els.msg.className = "footer" + (isError ? " err" : "");
    }

    function attr(device, name) {
      const attrs = collectAttributes(device);
      return attrs[String(name).toLowerCase()] ?? null;
    }

    function collectAttributes(device) {
      const out = {};
      if (!device) {
        return out;
      }
      const merge = (name, val) => {
        if (name == null || val == null || val === "") {
          return;
        }
        out[String(name).toLowerCase()] = val;
      };

      const a = device.attributes;
      if (Array.isArray(a)) {
        a.forEach((row) => merge(row.name, row.currentValue ?? row.value));
      } else if (a && typeof a === "object") {
        Object.entries(a).forEach(([k, v]) => merge(k, v?.currentValue ?? v));
      }

      const caps = device.capabilities;
      if (Array.isArray(caps)) {
        caps.forEach((cap) => {
          if (cap && typeof cap === "object" && Array.isArray(cap.attributes)) {
            cap.attributes.forEach((row) => merge(row.name, row.currentValue ?? row.value));
          }
        });
      }

      ["volumedb", "volume", "level", "mute", "switch", "input", "mediainputsource"].forEach((key) => {
        if (device[key] != null && out[key] == null) {
          merge(key, device[key]);
        }
      });

      return out;
    }

    function attributeUrl(deviceId, attributeName) {
      const q = `access_token=${encodeURIComponent(cfg.makerAccessToken)}`;
      return `${apiBase()}/devices/${deviceId}/attribute/${attributeName}?${q}`;
    }

    function eventsUrl(deviceId) {
      const q = `access_token=${encodeURIComponent(cfg.makerAccessToken)}`;
      return `${apiBase()}/devices/${deviceId}/events?${q}`;
    }

    async function fetchMakerAttribute(deviceId, attributeName) {
      try {
        const res = await fetch(attributeUrl(deviceId, attributeName));
        if (!res.ok) {
          return null;
        }
        const data = await res.json();
        if (typeof data === "string" || typeof data === "number") {
          return data;
        }
        if (Array.isArray(data)) {
          const row = data.find((x) => String(x?.name || "").toLowerCase() === attributeName.toLowerCase());
          return row?.currentValue ?? row?.value ?? null;
        }
        const attrs = collectAttributes(data);
        return attrs[attributeName.toLowerCase()] ?? data?.currentValue ?? data?.value ?? null;
      } catch (e) {
        return null;
      }
    }

    async function fetchVolumeFromEvents(deviceId) {
      try {
        const res = await fetch(eventsUrl(deviceId));
        if (!res.ok) {
          return null;
        }
        const data = await res.json();
        const events = Array.isArray(data) ? data : data?.events ?? [];
        for (const ev of events) {
          const name = String(ev.name || ev.attribute || "").toLowerCase();
          if (name === "volumedb" || name === "volume" || name === "level") {
            const label = formatVolume(ev.value ?? ev.currentValue, name === "volume" || name === "level");
            if (label) {
              return label;
            }
          }
        }
      } catch (e) {
        return null;
      }
      return null;
    }

    async function resolveVolume(deviceId, device) {
      let vol = volumeLabelFromMap(collectAttributes(device));
      if (vol) {
        return vol;
      }
      for (const name of ["volumeDb", "volume", "level"]) {
        const raw = await fetchMakerAttribute(deviceId, name);
        const label = formatVolume(raw, name === "volume" || name === "level");
        if (label) {
          return label;
        }
      }
      return fetchVolumeFromEvents(deviceId);
    }

    async function hubCmd(deviceId, command) {
      const res = await fetch(apiUrl(deviceId, command), { method: "POST" });
      if (!res.ok) throw new Error(`${command} failed (${res.status})`);
    }

    async function hubGet(deviceId) {
      const res = await fetch(deviceUrl(deviceId));
      if (!res.ok) throw new Error(`status ${res.status}`);
      return res.json();
    }

    function setPowerUi(pill, btn, isOn) {
      pill.textContent = isOn ? "ON" : "OFF";
      pill.className = "pill " + (isOn ? "on" : "off");
      btn.textContent = isOn ? "Power Off" : "Power On";
      btn.className = "btn power " + (isOn ? "on" : "off-state");
    }

    function formatVolume(raw, isLevelPercent) {
      if (raw == null || raw === "") {
        return null;
      }
      if (isLevelPercent) {
        return `${raw}%`;
      }
      const s = String(raw).trim();
      if (!s || s === "null") {
        return null;
      }
      if (/min/i.test(s)) {
        return "MIN";
      }
      const dbMatch = s.match(/^([+-]?\d+(?:\.\d+)?)\s*dB?$/i);
      if (dbMatch) {
        return `${dbMatch[1]} dB`;
      }
      if (/^[+-]?\d+(?:\.\d+)?$/.test(s)) {
        return `${s} dB`;
      }
      return s;
    }

    function volumeLabelFromMap(attrs) {
      const preferred = ["volumedb", "volume", "level", "volumelevel", "soundvolume"];
      for (const key of preferred) {
        if (attrs[key] != null && attrs[key] !== "") {
          const label = formatVolume(attrs[key], key === "volume" || key === "level");
          if (label) {
            return label;
          }
        }
      }
      for (const [key, val] of Object.entries(attrs)) {
        if (/vol/i.test(key) && val != null && val !== "") {
          const label = formatVolume(val, key === "volume" || key === "level");
          if (label) {
            return label;
          }
        }
      }
      return null;
    }

    function volumeLabel(device) {
      return volumeLabelFromMap(collectAttributes(device));
    }

    async function fetchVolumeDbDirect() {
      if (!cfg.mainDeviceId) {
        return null;
      }
      const raw = await fetchMakerAttribute(cfg.mainDeviceId, "volumeDb");
      return formatVolume(raw, false);
    }

    async function pollVolumeDbAfterCommand() {
      volumeFreshUntil = Date.now() + 3500;
      const deadline = Date.now() + 3000;
      while (Date.now() < deadline) {
        const vol = await fetchVolumeDbDirect();
        if (vol) {
          lastLocalVolume = vol;
          const isMuted = document.getElementById("mainMute").textContent === "Unmute";
          setMainStatusUi(vol, isMuted);
          volumeFreshUntil = Date.now() + 800;
          return;
        }
        await sleep(200);
      }
    }

    function parseVolumeFromDisplay(text) {
      const raw = String(text).trim();
      if (raw === "—" || raw === "MIN") {
        return null;
      }
      let db = parseVolumeDb(raw);
      if (db != null) {
        return db;
      }
      const pctMatch = raw.match(/^(\d+(?:\.\d+)?)\s*%$/);
      if (pctMatch) {
        return parseFloat(pctMatch[1]) - 80;
      }
      return null;
    }

    function parseVolumeDb(text) {
      const m = String(text).match(/(-?\d+(?:\.\d+)?)\s*dB/i);
      return m ? parseFloat(m[1]) : null;
    }

    function formatVolumeDb(db) {
      if (db <= -80) {
        return "MIN";
      }
      return `${db.toFixed(1)} dB`;
    }

    function setMainStatusUi(vol, isMuted) {
      const volText = vol || "—";
      if (els.mainVolume) {
        els.mainVolume.textContent = volText;
        els.mainVolume.className = "vol-readout" + (isMuted ? " muted" : "");
      }
      els.mainMeta.textContent = `Volume ${volText} · ${isMuted ? "Muted" : "Unmuted"}`;
      document.getElementById("mainMute").textContent = isMuted ? "Unmute" : "Mute";
    }

    function optimisticMuteToggle() {
      const muteBtn = document.getElementById("mainMute");
      const vol = els.mainVolume.textContent.trim() || "—";
      setMainStatusUi(vol, muteBtn.textContent !== "Unmute");
    }

    function optimisticVolumeStep(delta) {
      const db = parseVolumeFromDisplay(els.mainVolume.textContent);
      if (db == null) {
        return;
      }
      const next = Math.min(12, Math.max(-80, db + delta * 0.5));
      const label = formatVolumeDb(next);
      lastLocalVolume = label;
      volumeFreshUntil = Date.now() + 3500;
      const isMuted = document.getElementById("mainMute").textContent === "Unmute";
      setMainStatusUi(label, isMuted);
    }

    async function ensureVolumeKnown(deviceId, device) {
      if (volumeRefreshRequested || !deviceId) {
        return null;
      }
      if (volumeLabel(device)) {
        return null;
      }
      if (attr(device, "switch") !== "on") {
        return null;
      }
      volumeRefreshRequested = true;
      try {
        await hubCmd(deviceId, "refresh");
        await sleep(1500);
        return await hubGet(deviceId);
      } catch (e) {
        return null;
      }
    }

    function inputLabel(device) {
      return attr(device, "mediaInputSource") || attr(device, "input") || "—";
    }

    async function refreshZone(deviceId, prefix) {
      if (!deviceId) return;
      const d = await hubGet(deviceId);
      const on = attr(d, "switch") === "on";
      setPowerUi(els[prefix + "PowerPill"], document.getElementById(prefix + "Power"), on);
      document.getElementById(prefix + "Input").textContent = inputLabel(d);
      if (prefix === "main") {
        let vol = await resolveVolume(deviceId, d);
        const mute = attr(d, "mute") || "—";
        if (!on) {
          volumeRefreshRequested = false;
        } else if (!vol) {
          const updated = await ensureVolumeKnown(deviceId, d);
          if (updated) {
            vol = (await resolveVolume(deviceId, updated)) || vol;
          }
        }
        if (Date.now() < volumeFreshUntil && lastLocalVolume) {
          vol = lastLocalVolume;
        } else if (vol) {
          lastLocalVolume = vol;
        }
        setMainStatusUi(vol, mute === "muted");
        if (DEBUG && !vol) {
          setMsg("No volume in API. Attrs: " + Object.keys(collectAttributes(d)).sort().join(", "), true);
        }
      }
    }

    async function refreshAll() {
      if (!cfg.hubIp || !cfg.makerAccessToken || !cfg.mainDeviceId) {
        setMsg("Configure connection (⚙)", true);
        return;
      }
      if (refreshInFlight) {
        refreshPending = true;
        return;
      }
      refreshInFlight = true;
      try {
        const appState = await fetchLiveState();
        if (appState?.main) {
          applyMainZoneState(appState.main);
          if (cfg.hdZoneDeviceId && appState.hd) {
            els.hdZone.style.opacity = "1";
            applyHdZoneState(appState.hd);
          } else if (cfg.hdZoneDeviceId) {
            await refreshZone(cfg.hdZoneDeviceId, "hd");
          } else {
            els.hdZone.style.opacity = "0.45";
            els.hdInput.textContent = "Not configured";
          }
        } else {
          await refreshZone(cfg.mainDeviceId, "main");
          if (cfg.hdZoneDeviceId) {
            els.hdZone.style.opacity = "1";
            await refreshZone(cfg.hdZoneDeviceId, "hd");
          } else {
            els.hdZone.style.opacity = "0.45";
            els.hdInput.textContent = "Not configured";
          }
          if (DEBUG) {
            setMsg("Using Maker API — re-save Pioneer AVR Dashboard app (v1.1.0+)", true);
          }
        }
        if (!DEBUG || appState?.main) {
          setMsg("Updated " + new Date().toLocaleTimeString());
        }
      } catch (e) {
        setMsg(e.message, true);
      } finally {
        refreshInFlight = false;
        if (refreshPending) {
          refreshPending = false;
          refreshAll();
        }
      }
    }

    async function pollBurstRefresh() {
      if (burstPollTimer) {
        clearTimeout(burstPollTimer);
        burstPollTimer = null;
      }
      const deadline = Date.now() + BURST_POLL_DURATION_MS;
      while (Date.now() < deadline) {
        await refreshAll();
        await sleep(BURST_POLL_MS);
      }
    }

    function scheduleRefresh() {
      if (refreshTimer) {
        clearTimeout(refreshTimer);
      }
      const delay = Date.now() < fastRefreshUntil ? FAST_REFRESH_MS : NORMAL_REFRESH_MS;
      refreshTimer = setTimeout(async () => {
        await refreshAll();
        scheduleRefresh();
      }, delay);
    }

    function burstRefresh() {
      fastRefreshUntil = Date.now() + FAST_REFRESH_DURATION_MS;
      refreshAll();
      pollBurstRefresh();
      scheduleRefresh();
    }

    async function runCommand(deviceId, command, label, optimistic) {
      if (typeof optimistic === "function") {
        optimistic();
      }
      await hubCmd(deviceId, command);
      setMsg(label);
      if (command === "volumeUp" || command === "volumeDown") {
        pollVolumeDbAfterCommand();
      }
      burstRefresh();
    }

    async function togglePower(deviceId, prefix) {
      const d = await hubGet(deviceId);
      const cmd = attr(d, "switch") === "on" ? "off" : "on";
      await hubCmd(deviceId, cmd);
      setMsg(`${prefix} power ${cmd}`);
      burstRefresh();
    }

    async function loadTokenFile() {
      try {
        const res = await fetch("./pioneer-avr-token.json?ts=" + Date.now());
        if (!res.ok) return false;
        const t = await res.json();
        cfg.hubIp = t.hubIp || cfg.hubIp;
        cfg.makerAppId = t.makerAppId || cfg.makerAppId;
        cfg.makerAccessToken = t.makerAccessToken || cfg.makerAccessToken;
        cfg.mainDeviceId = t.mainDeviceId || cfg.mainDeviceId;
        cfg.hdZoneDeviceId = t.hdZoneDeviceId || cfg.hdZoneDeviceId;
        saveStoredCfg();
        return true;
      } catch (e) {
        return false;
      }
    }

    function bindButtons() {
      const err = (e) => setMsg(e.message, true);

      document.getElementById("mainInNext").onclick = () =>
        runCommand(cfg.mainDeviceId, "inputNext", "Main input +").catch(err);
      document.getElementById("mainInPrev").onclick = () =>
        runCommand(cfg.mainDeviceId, "inputPrevious", "Main input −").catch(err);
      document.getElementById("mainVolUp").onclick = () =>
        runCommand(cfg.mainDeviceId, "volumeUp", "Volume +", () => optimisticVolumeStep(1)).catch(err);
      document.getElementById("mainVolDown").onclick = () =>
        runCommand(cfg.mainDeviceId, "volumeDown", "Volume −", () => optimisticVolumeStep(-1)).catch(err);
      document.getElementById("mainMute").onclick = () =>
        runCommand(cfg.mainDeviceId, "muteToggle", "Mute toggled", optimisticMuteToggle).catch(err);
      document.getElementById("mainPower").onclick = () =>
        togglePower(cfg.mainDeviceId, "Main").catch(err);

      document.getElementById("hdInNext").onclick = () => {
        if (!cfg.hdZoneDeviceId) return setMsg("HD Zone not configured", true);
        runCommand(cfg.hdZoneDeviceId, "inputNext", "HD input +").catch(err);
      };
      document.getElementById("hdInPrev").onclick = () => {
        if (!cfg.hdZoneDeviceId) return setMsg("HD Zone not configured", true);
        runCommand(cfg.hdZoneDeviceId, "inputPrevious", "HD input −").catch(err);
      };
      document.getElementById("hdPower").onclick = () => {
        if (!cfg.hdZoneDeviceId) return setMsg("HD Zone not configured", true);
        togglePower(cfg.hdZoneDeviceId, "HD").catch(err);
      };
    }

    const dialog = document.getElementById("settingsDialog");
    document.getElementById("settingsBtn").onclick = () => {
      document.getElementById("cfgHubIp").value = cfg.hubIp;
      document.getElementById("cfgAppId").value = cfg.makerAppId;
      document.getElementById("cfgToken").value = cfg.makerAccessToken;
      document.getElementById("cfgMainId").value = cfg.mainDeviceId;
      document.getElementById("cfgHdId").value = cfg.hdZoneDeviceId;
      dialog.showModal();
    };
    document.getElementById("cfgCancel").onclick = () => dialog.close();
    document.getElementById("cfgSave").onclick = () => {
      cfg.hubIp = document.getElementById("cfgHubIp").value.trim();
      cfg.makerAppId = document.getElementById("cfgAppId").value.trim() || "1";
      cfg.makerAccessToken = document.getElementById("cfgToken").value.trim();
      cfg.mainDeviceId = document.getElementById("cfgMainId").value.trim();
      cfg.hdZoneDeviceId = document.getElementById("cfgHdId").value.trim();
      saveStoredCfg();
      dialog.close();
      els.hubLabel.textContent = cfg.hubIp ? `Hub ${cfg.hubIp}` : "Not configured";
      burstRefresh();
    };

    (async function init() {
      loadStoredCfg();
      await loadTokenFile();
      els.hubLabel.textContent = cfg.hubIp ? `Hub ${cfg.hubIp} · v${PIONEER_DASHBOARD_VERSION}` : "Open via hub /local/ URL";
      bindButtons();
      await refreshAll();
      scheduleRefresh();
    })();
  </script>
</body>
</html>
